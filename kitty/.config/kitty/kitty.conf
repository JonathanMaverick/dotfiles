# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Shell
shell            /bin/zsh

# Cursor
cursor_shape     block
cursor_blink_interval 0.5

# Transparency
background_opacity 0.85
background_blur    50

# Padding
window_padding_width 12 16

# Window chrome
hide_window_decorations yes

# Scrollback
scrollback_lines 10000



# PYWAL_COLORS_START

foreground #c2c4c6
background #0c131e

